name: CI

on:
  push:
    branches: [main]
  pull_request:
  # core-bump 開的 PR 用 GITHUB_TOKEN,不會自動觸發 pull_request(GitHub 防遞迴);
  # 由 core-bump dispatch 本 workflow 補跑,跑在同一 head sha,PR checks 照樣顯示。
  workflow_dispatch:

# 最小權限:CI 只讀 code 跑測試,不需要任何寫入。
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 守門:package.json 宣稱的 collector-core tag 必須 == 實際安裝版本。
      # npm ci 對 git dep 只驗 spec 字串不驗 lock resolved(PR #49 曾綠著裝舊版)。
      # 此守門段原三支 collector 各持一份,#9 併一後只存於本 repo。core 的 exports 沒開放 ./package.json 子路徑,
      # 要走 ./node_modules/ 檔案路徑直讀(裸 require 會 ERR_PACKAGE_PATH_NOT_EXPORTED)。
      - run: |
          node -e "
          const spec=(require('./package.json').dependencies||{})['@pei760730/collector-core']||'';
          const m=spec.match(/#v(.+)\$/);
          if(!m){console.log('skip: not a git-tag dep');process.exit(0);}
          const inst=require('./node_modules/@pei760730/collector-core/package.json').version;
          if(inst!==m[1]){console.error('declared v'+m[1]+' !== installed '+inst);process.exit(1);}
          console.log('collector-core ok: '+inst);
          "
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # main push 紅燈才報(PR 紅燈在 PR 頁自己會看到,不吵):收攏推到統一通知 bot
      # (@MYNOOTIFYBot),走 kai-notify(fail-soft),用法對齊 collect.yml。
      # on.push 只掛 main,event_name == 'push' 即等價「main push」。
      - name: Notify Kai on failure (kai-notify)
        if: failure() && github.event_name == 'push'
        uses: pei760730/kai-notify@v1
        env:
          KAI_NOTIFY_BOT_TOKEN: ${{ secrets.KAI_NOTIFY_BOT_TOKEN }}
          KAI_NOTIFY_CHAT_ID: ${{ secrets.KAI_NOTIFY_CHAT_ID }}
        with:
          text: "🔴 collector CI 紅燈(main push):${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
