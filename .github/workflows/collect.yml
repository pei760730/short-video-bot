name: collect

# 定時把 Telegram 這段時間囤的訊息撈乾、解析、寫進「參考池」,然後結束。
# 取代常駐機器:repo 是 public → Actions 免費額度無上限,$0。
# Telegram 保留未領更新約 24h,只要間隔 < 24h 就不漏訊息。
on:
  schedule:
    - cron: "*/5 * * * *" # 每 5 分(UTC,GitHub 排程下限);實際 GitHub 常拖到更久,非秒到。public Actions 免費無上限
  workflow_dispatch: {} # 手動補跑(要立刻收就按這個)

# 同時只跑一個,避免兩個 job 並行領 getUpdates 互搶(會漏 ack)。
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 保險:任何意外卡死 10 分鐘殺掉,別吃滿 6h 額度、堵住後續 cron
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: drain
        # 留存輸出供失敗通知擷取真因(default shell 已含 -o pipefail,npm 退出碼會正確傳遞)。
        run: npm run drain 2>&1 | tee drain.log
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          STORAGE: sheets
          # 來源白名單:只收這些 chat/user id 的訊息(公開後防陌生人灌池)。
          # 必設 —— 沒設 sheets 模式會 fail-fast 直接紅燈(寧可不跑,也不要大開)。
          ALLOWED_CHAT_IDS: ${{ secrets.ALLOWED_CHAT_IDS }}
          # cron 無人等候,展開 TikTok 等短連結→正規連結,讓短/長連結去重一致。
          # 展開失敗會優雅退回原值(不會更糟)。
          EXPAND_SHORT_URLS: "true"
          # 寫表失敗時的 Telegram 告警對象(從 secret 注入,別硬編任何人的 chat id)。
          # 沒設的話 notifyError 會 no-op,cron 默默壞掉收不到通知。
          ERROR_CHAT_ID: ${{ secrets.ERROR_CHAT_ID }}

      # 失敗才報:drain job 崩潰時抓 log 尾巴真因,收攏推到統一通知 bot(@MYNOOTIFYBot),走 kai-notify(fail-soft)。
      - name: Build failure message
        if: failure()
        id: failmsg
        run: |
          ERR=$(grep -iE 'ERROR|Error:|錯誤|失敗' drain.log 2>/dev/null | tail -n 2 | tr '\n' ' ' | cut -c1-280)
          [ -z "$ERR" ] && ERR="(未擷取到錯誤,請看 log)"
          echo "text=🔴 short-video-bot collect 失敗:${ERR} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
      - name: Notify Kai on failure (kai-notify)
        if: failure()
        uses: pei760730/kai-notify@main
        env:
          KAI_NOTIFY_BOT_TOKEN: ${{ secrets.KAI_NOTIFY_BOT_TOKEN }}
          KAI_NOTIFY_CHAT_ID: ${{ secrets.KAI_NOTIFY_CHAT_ID }}
        with:
          text: ${{ steps.failmsg.outputs.text }}
