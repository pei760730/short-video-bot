services:
  bot:
    build: .
    container_name: short-video-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 自架預設長連線,不需公網 IP / webhook
      BOT_MODE: polling
      # 容器內憑證路徑(對應下面的 volume 掛載)
      GOOGLE_SERVICE_ACCOUNT_FILE: /app/service_account.json
    volumes:
      # service account 不烤進 image,改唯讀掛載(機密留在 host)
      - ./service_account.json:/app/service_account.json:ro
    # 若改 webhook 模式,打開下面對外埠並設 WEBHOOK_DOMAIN
    # ports:
    #   - "8080:8080"
